<svg width="460" height="96" viewBox="0 0 460 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Accelerated wordmark logo</title>
  <desc id="desc">Stylized Accelerated logotype with dynamic speed accents</desc>
  <defs>
    <linearGradient id="accelText" x1="18" y1="70" x2="420" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F7A53"/>
      <stop offset="0.62" stop-color="#20966C"/>
      <stop offset="1" stop-color="#2E7CB8"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="460" height="96" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F7A53" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <text x="22" y="64" fill="url(#accelText)" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="56" font-style="italic" font-weight="800" letter-spacing="0.4">Accelerated</text>
  </g>

  <path d="M22 74H255" stroke="url(#accelText)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M262 74H294" stroke="url(#accelText)" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M300 74H323" stroke="url(#accelText)" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>

  <path d="M18 30H44" stroke="url(#accelText)" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
  <path d="M10 38H34" stroke="url(#accelText)" stroke-width="3.2" stroke-linecap="round" opacity="0.52"/>
</svg>
